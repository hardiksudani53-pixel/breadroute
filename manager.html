<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Portal</title>
    <style>
        /* Classic High-Contrast Styling */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; color: #fff; text-align: center; padding: 15px; }
        .app-card { max-width: 400px; margin: auto; background: #ecf0f1; padding: 25px; border-radius: 15px; color: #333; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #bdc3c7; padding-bottom: 10px; }
        
        label { display: block; text-align: left; font-weight: bold; margin: 15px 0 5px 2px; font-size: 14px; color: #555; }
        .timer-box { font-size: 2rem; font-family: monospace; font-weight: bold; margin: 5px 0; color: #2c3e50; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #bdc3c7; }
        
        /* Manager Buttons */
        button { width: 100%; padding: 15px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; color: white; transition: 0.2s; margin-bottom: 10px; }
        .btn-drive { background-color: #3498db; box-shadow: 0 4px 0 #2980b9; }
        .btn-merch { background-color: #f39c12; box-shadow: 0 4px 0 #d35400; }
        .btn-submit { background-color: #2ecc71; box-shadow: 0 4px 0 #27ae60; margin-top: 20px; font-size: 1.3rem; }
        
        button:active { transform: translateY(3px); box-shadow: none; }
        textarea { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #bdc3c7; font-size: 16px; box-sizing: border-box; margin-top: 10px; height: 70px; resize: none; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>MANAGER PORTAL</h2>
    
    <label>DRIVING TIME:</label>
    <div id="driveDisplay" class="timer-box">00:00:00</div>
    <button id="driveBtn" class="btn-drive" onclick="toggleTimer('drive')">START DRIVING</button>

    <label>MERCHANDISING TIME:</label>
    <div id="merchDisplay" class="timer-box">00:00:00</div>
    <button id="merchBtn" class="btn-merch" onclick="toggleTimer('merch')">START MERCHANDISING</button>

    <textarea id="notes" placeholder="Shift notes or store visits..."></textarea>
    
    <button id="submitBtn" class="btn-submit" onclick="submitData()">SUBMIT TO MANAGER TAB</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWBIFzFwoOPETXXdFSHtuyyBK5xfFSLqqN9teg7hmH3nAnq3VfznXl7BpaueVlwQNyGg/exec";

    let timers = {
        drive: { active: false, seconds: 0, interval: null },
        merch: { active: false, seconds: 0, interval: null }
    };

    function toggleTimer(type) {
        let t = timers[type];
        let btn = document.getElementById(type + 'Btn');
        let display = document.getElementById(type + 'Display');

        if (!t.active) {
            t.active = true;
            btn.innerText = "STOP " + type.toUpperCase();
            btn.style.opacity = "0.8";
            t.interval = setInterval(() => {
                t.seconds++;
                display.innerText = formatTime(t.seconds);
            }, 1000);
        } else {
            t.active = false;
            btn.innerText = "START " + type.toUpperCase();
            btn.style.opacity = "1";
            clearInterval(t.interval);
        }
    }

    function formatTime(s) {
        let h = String(Math.floor(s / 3600)).padStart(2, '0');
        let m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
        let sec = String(s % 60).padStart(2, '0');
        return `${h}:${m}:${sec}`;
    }

    function submitData() {
        const btn = document.getElementById('submitBtn');
        btn.innerText = "UPLOADING...";
        btn.disabled = true;

        const payload = {
            action: "submitData",
            sheetType: "manager", // GOES TO MANAGER TAB
            date: new Date().toLocaleString(),
            worker: "Manager (Tracked Hours)",
            oldDolly: "0.00", 
            newDolly: "0.00",
            duration: `Drive: ${document.getElementById('driveDisplay').innerText} | Merch: ${document.getElementById('merchDisplay').innerText}`,
            notes: document.getElementById('notes').value
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert("Manager data saved successfully!");
            location.reload();
        });
    }
</script>

</body>
</html>
