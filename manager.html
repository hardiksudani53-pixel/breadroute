<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager - Time Tracker</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #eef2f7; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .timer-box { font-size: 1.5em; font-weight: bold; margin: 10px 0; color: #333; border: 1px solid #ccc; padding: 10px; border-radius: 5px; background: #fff; }
        button { width: 100%; margin: 10px 0; padding: 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; color: white; }
        .btn-drive { background-color: #0275d8; }
        .btn-merch { background-color: #f0ad4e; }
        .btn-submit { background-color: #5cb85c; }
        textarea { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; font-size: 14px; margin-top: 10px; }
        label { display: block; text-align: left; font-weight: bold; margin-top: 10px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>Manager Portal</h2>
    <p>Track Drive & Merchandising Time</p>

    <label>Driving Timer:</label>
    <div id="driveDisplay" class="timer-box">00:00:00</div>
    <button id="driveBtn" class="btn-drive" onclick="toggleTimer('drive')">START DRIVING</button>

    <label>Merchandising Timer:</label>
    <div id="merchDisplay" class="timer-box">00:00:00</div>
    <button id="merchBtn" class="btn-merch" onclick="toggleTimer('merch')">START MERCHANDISING</button>

    <textarea id="notes" placeholder="Shift notes (optional)..."></textarea>
    
    <button id="submitBtn" class="btn-submit" onclick="submitData()">SUBMIT TO MANAGER TAB</button>
</div>

<script>
    // 1. YOUR GOOGLE SCRIPT URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWBIFzFwoOPETXXdFSHtuyyBK5xfFSLqqN9teg7hmH3nAnq3VfznXl7BpaueVlwQNyGg/exec";

    // Timer variables
    let timers = {
        drive: { active: false, seconds: 0, interval: null },
        merch: { active: false, seconds: 0, interval: null }
    };

    function toggleTimer(type) {
        let t = timers[type];
        let btn = document.getElementById(type + 'Btn');
        let display = document.getElementById(type + 'Display');

        if (!t.active) {
            // Start Timer
            t.active = true;
            btn.innerText = "STOP " + type.toUpperCase();
            btn.style.opacity = "0.7";
            t.interval = setInterval(() => {
                t.seconds++;
                display.innerText = formatTime(t.seconds);
            }, 1000);
        } else {
            // Stop Timer
            t.active = false;
            btn.innerText = "START " + type.toUpperCase();
            btn.style.opacity = "1";
            clearInterval(t.interval);
        }
    }

    function formatTime(totalSeconds) {
        let h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
        let m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
        let s = String(totalSeconds % 60).padStart(2, '0');
        return `${h}:${m}:${s}`;
    }

    function submitData() {
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "Uploading...";
        submitBtn.disabled = true;

        // This is the specific payload the Google Script needs to route data to the Manager sheet
        const payload = {
            action: "submitData",
            sheetType: "manager",  // THIS ENSURES IT GOES TO THE MANAGER TAB
            date: new Date().toLocaleString(),
            worker: "Manager (Tracked Hours)",
            oldDolly: "0.00", 
            newDolly: "0.00",
            duration: `Drive: ${document.getElementById('driveDisplay').innerText} | Merch: ${document.getElementById('merchDisplay').innerText}`,
            notes: document.getElementById('notes').value
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert("Success! Manager data saved.");
            location.reload(); // Resets everything
        })
        .catch(err => {
            alert("Error: " + err);
            submitBtn.disabled = false;
            submitBtn.innerText = "SUBMIT TO MANAGER TAB";
        });
    }
</script>

</body>
</html>
