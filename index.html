<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bread Route Tracker</title>
    <style>
        /* Classic High-Contrast Styling */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; color: #fff; text-align: center; padding: 15px; }
        .app-card { max-width: 400px; margin: auto; background: #ecf0f1; padding: 25px; border-radius: 15px; color: #333; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #bdc3c7; padding-bottom: 10px; }
        
        label { display: block; text-align: left; font-weight: bold; margin: 12px 0 5px 2px; font-size: 14px; }
        select, input, textarea { width: 100%; padding: 14px; border-radius: 8px; border: 2px solid #bdc3c7; font-size: 16px; box-sizing: border-box; background: white; }
        
        #status { font-size: 15px; font-weight: bold; margin-bottom: 15px; padding: 10px; border-radius: 8px; background: #fff; border: 1px solid #ddd; }
        #timer { font-size: 3rem; font-family: monospace; font-weight: bold; margin: 15px 0; color: #2c3e50; }
        
        /* Big Action Button */
        #startBtn { width: 100%; padding: 20px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; color: white; transition: 0.3s; box-shadow: 0 4px 0 #27ae60; background-color: #2ecc71; }
        #startBtn:active { transform: translateY(3px); box-shadow: none; }
        #startBtn:disabled { background-color: #95a5a6; box-shadow: 0 4px 0 #7f8c8d; cursor: not-allowed; }
        
        textarea { margin-top: 15px; height: 80px; resize: none; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>ROUTE TRACKER</h2>
    
    <div id="status">Checking GPS...</div>

    <label>Worker:</label>
    <select id="worker">
        <option value="">-- Select Name --</option>
        <option value="BB">BB</option>
        <option value="Harshu">Harshu</option>
        <option value="Deepak">Deepak</option>
    </select>

    <label>Store:</label>
    <select id="store" onchange="updateTarget()">
        <option value="Sobeys">Sobeys</option>
        <option value="Walmart">Walmart</option>
    </select>

    <label>Old Dolly (Previous):</label>
    <select id="oldDolly">
        <option value="0">0</option>
        <option value="0.25">0.25</option><option value="0.50">0.50</option><option value="0.75">0.75</option>
        <option value="1">1</option><option value="1.25">1.25</option><option value="1.50">1.50</option><option value="1.75">1.75</option>
        <option value="2">2</option><option value="2.25">2.25</option><option value="2.50">2.50</option><option value="2.75">2.75</option>
        <option value="3">3</option><option value="3.25">3.25</option><option value="3.50">3.50</option><option value="3.75">3.75</option>
        <option value="4">4</option><option value="5">5</option>
    </select>

    <label>New Dolly (Fresh):</label>
    <select id="newDolly">
        <option value="0">0</option>
        <option value="0.25">0.25</option><option value="0.50">0.50</option><option value="0.75">0.75</option>
        <option value="1">1</option><option value="1.25">1.25</option><option value="1.50">1.50</option><option value="1.75">1.75</option>
        <option value="2">2</option><option value="2.25">2.25</option><option value="2.50">2.50</option><option value="2.75">2.75</option>
        <option value="3">3</option><option value="3.25">3.25</option><option value="3.50">3.50</option><option value="3.75">3.75</option>
        <option value="4">4</option><option value="5">5</option>
    </select>

    <div id="timer">00:00:00</div>
    
    <button id="startBtn" onclick="toggleTracking()" disabled>START TRACKING</button>
    
    <textarea id="notes" placeholder="Any notes for today?"></textarea>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWBIFzFwoOPETXXdFSHtuyyBK5xfFSLqqN9teg7hmH3nAnq3VfznXl7BpaueVlwQNyGg/exec";

    let tLat = 45.34379956415204; 
    let tLng = -80.00785070506414;
    const ALLOWED_RADIUS = 300; 

    function updateTarget() {
        const s = document.getElementById('store').value;
        tLat = (s === 'Walmart') ? 45.34725026580236 : 45.34379956415204;
        tLng = (s === 'Walmart') ? -80.01192826729029 : -80.00785070506414;
        checkLocation();    
        fetchPastHistory(); 
    }

    function fetchPastHistory() {
        const worker = document.getElementById('worker').value;
        const store = document.getElementById('store').value;
        if (!worker || !store) return;
        
        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/plain' }, 
            body: JSON.stringify({ action: "fetchLastCount", worker: worker, store: store })
        })
        .then(r => r.json())
        .then(data => {
            document.getElementById('oldDolly').value = data.lastCount; 
        });
    }

    document.getElementById('worker').addEventListener('change', fetchPastHistory);

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const a = Math.sin((lat2-lat1)*Math.PI/360)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin((lon2-lon1)*Math.PI/360)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function checkLocation() {
        navigator.geolocation.getCurrentPosition(p => {
            const dist = getDistance(p.coords.latitude, p.coords.longitude, tLat, tLng);
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('startBtn');
            if (dist <= ALLOWED_RADIUS) {
                statusEl.innerText = "✓ ON-SITE VERIFIED";
                statusEl.style.color = "green";
                btn.disabled = false;
            } else {
                statusEl.innerText = "✗ DENIED: " + Math.round(dist) + "m AWAY";
                statusEl.style.color = "red";
                btn.disabled = true;
            }
        }, null, { enableHighAccuracy: true });
    }

    let startTime, timerInterval, isTracking = false;

    function toggleTracking() {
        const btn = document.getElementById('startBtn');
        if (!isTracking) {
            isTracking = true;
            startTime = new Date();
            btn.innerText = "STOP TRACKING";
            btn.style.backgroundColor = "#e74c3c"; 
            btn.style.boxShadow = "0 4px 0 #c0392b";
            timerInterval = setInterval(() => {
                const diff = new Date() - startTime;
                const hrs = String(Math.floor(diff / 3600000)).padStart(2, '0');
                const mins = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
                const secs = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
                document.getElementById('timer').innerText = `${hrs}:${mins}:${secs}`;
            }, 1000);
        } else {
            clearInterval(timerInterval);
            submitData();
        }
    }

    function submitData() {
        const btn = document.getElementById('startBtn');
        btn.innerText = "SENDING...";
        btn.disabled = true;

        const payload = {
            action: "submitData",
            sheetType: "employee",
            date: startTime.toLocaleString(),
            worker: document.getElementById('worker').value,
            oldDolly: document.getElementById('oldDolly').value,
            newDolly: document.getElementById('newDolly').value,
            duration: document.getElementById('timer').innerText,
            notes: `Store: ${document.getElementById('store').value}. ${document.getElementById('notes').value}`
        };

        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => { alert("Shift Data Saved!"); location.reload(); });
    }

    window.onload = checkLocation;
</script>
</body>
</html>
