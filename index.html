<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bread App</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; background: #f4f4f9; }
        .box { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select, input, button, textarea { width: 100%; margin: 10px 0; padding: 12px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { background: #5cb85c; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
        #timer { font-size: 2em; font-weight: bold; margin: 10px 0; }
        #status { font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Route Tracker</h2>
    <div id="status">Checking Location...</div>

    <select id="worker">
        <option value="">-- Select Your Name --</option>
        <option value="Hardik">Hardik</option>
        <option value="Associate 1">Associate 1</option>
    </select>

    <select id="store" onchange="updateTarget()">
        <option value="Sobeys">Sobeys</option>
        <option value="Walmart">Walmart</option>
    </select>

    <input type="number" id="oldDolly" placeholder="Old Dolly Count">
    <input type="number" id="newDolly" placeholder="New Dolly Count">
    
    <div id="timer">00:00:00</div>
    <button id="startBtn" onclick="toggleTracking()" disabled>START TRACKING</button>
    
    <textarea id="notes" placeholder="Notes..."></textarea>
</div>

<script>
    // 1. MUST PASTE YOUR GOOGLE URL HERE
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWBIFzFwoOPETXXdFSHtuyyBK5xfFSLqqN9teg7hmH3nAnq3VfznXl7BpaueVlwQNyGg/exec";

    let tLat = 45.34379956415204; 
    let tLng = -80.00785070506414;
    const ALLOWED_RADIUS = 300; 

    function updateTarget() {
        const s = document.getElementById('store').value;
        tLat = (s === 'Walmart') ? 45.34725026580236 : 45.34379956415204;
        tLng = (s === 'Walmart') ? -80.01192826729029 : -80.00785070506414;
        checkLocation();
        fetchPastHistory();
    }

    function fetchPastHistory() {
        const worker = document.getElementById('worker').value;
        const store = document.getElementById('store').value;
        const oldDollyInput = document.getElementById('oldDolly');
        if (!worker || !store) return;
        oldDollyInput.placeholder = "Loading...";
        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/plain' },
            body: JSON.stringify({ action: "fetchLastCount", worker: worker, store: store })
        })
        .then(r => r.json())
        .then(d => { oldDollyInput.value = d.lastCount; })
        .catch(e => { oldDollyInput.placeholder = "Enter Old Dolly"; });
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const p1 = lat1 * Math.PI / 180;
        const p2 = lat2 * Math.PI / 180;
        const dP = (lat2 - lat1) * Math.PI / 180;
        const dL = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dP/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dL/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function checkLocation() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(p => {
            const dist = getDistance(p.coords.latitude, p.coords.longitude, tLat, tLng);
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('startBtn');
            if (dist <= ALLOWED_RADIUS) {
                statusEl.innerText = "Verified: On-site";
                statusEl.style.color = "green";
                btn.disabled = false;
            } else {
                statusEl.innerText = "Denied: " + Math.round(dist) + "m away";
                statusEl.style.color = "red";
                btn.disabled = true;
            }
        }, e => { document.getElementById('status').innerText = "Enable GPS"; });
    }

    let startTime, timerInterval, isTracking = false;
    function toggleTracking() {
        const btn = document.getElementById('startBtn');
        if (!isTracking) {
            isTracking = true;
            startTime = new Date();
            btn.innerText = "STOP TRACKING";
            btn.style.backgroundColor = "red";
            timerInterval = setInterval(() => {
                const diff = new Date() - startTime;
                const hrs = String(Math.floor(diff/3600000)).padStart(2,'0');
                const mins = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
                const secs = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
                document.getElementById('timer').innerText = hrs+":"+mins+":"+secs;
            }, 1000);
        } else {
            clearInterval(timerInterval);
            submitData();
        }
    }

    function submitData() {
        const payload = {
            action: "submitData",
            sheetType: "employee",
            date: startTime.toLocaleString(),
            worker: document.getElementById('worker').value,
            oldDolly: document.getElementById('oldDolly').value || 0,
            newDolly: document.getElementById('newDolly').value || 0,
            duration: document.getElementById('timer').innerText,
            notes: "Store: " + document.getElementById('store').value + ". " + document.getElementById('notes').value
        };
        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => { alert("Saved!"); location.reload(); });
    }
    window.onload = checkLocation;
</script>
</body>
</html>
