<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parry Sound Bread Route</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .geo-locked { background-color: #fee2e2; border-color: #ef4444; color: #b91c1c; }
        .geo-active { background-color: #dcfce7; border-color: #22c55e; color: #15803d; }
        .btn-plus { background: #dcfce7; color: #15803d; border: 1px solid #22c55e; }
        .btn-minus { background: #fee2e2; color: #b91c1c; border: 1px solid #ef4444; }
    </style>
</head>
<body class="bg-slate-100 font-sans pb-10">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl">
        <!-- Header -->
        <div class="bg-slate-900 p-8 text-white text-center rounded-b-[3rem] shadow-xl">
            <h1 class="text-2xl font-black tracking-tighter italic">PARRY SOUND ROUTE</h1>
            <p id="clock" class="text-xs font-mono opacity-50 mt-1"></p>
        </div>

        <div class="p-6 space-y-6">
            <!-- Worker Selection -->
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Merchandiser</label>
                <select id="worker" onchange="updateTarget()" class="w-full p-4 border-2 border-slate-100 rounded-2xl bg-slate-50 text-lg font-bold outline-none">
                    <option value="BB">BB (Sobeys)</option>
                    <option value="Harshu">Harshu (Sobeys)</option>
                    <option value="Deepak">Deepak (Walmart)</option>
                </select>
            </div>

            <!-- GPS Status Box -->
            <div id="geoBox" class="p-4 rounded-2xl border-2 text-center geo-locked transition-all">
                <div id="geoStatus" class="font-black text-xs uppercase">Awaiting GPS...</div>
                <div id="distText" class="text-[10px] opacity-70 mt-1">Calculating distance...</div>
            </div>

            <!-- Dolly Counters -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Old Dollys</p>
                    <div class="flex items-center justify-between">
                        <button onclick="changeVal('oldDolly', -0.25)" class="btn-minus w-10 h-10 rounded-xl font-bold">-</button>
                        <span id="oldDolly" class="text-xl font-black">0.00</span>
                        <button onclick="changeVal('oldDolly', 0.25)" class="btn-plus w-10 h-10 rounded-xl font-bold">+</button>
                    </div>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Fresh Dollys</p>
                    <div class="flex items-center justify-between">
                        <button onclick="changeVal('newDolly', -0.25)" class="btn-minus w-10 h-10 rounded-xl font-bold">-</button>
                        <span id="newDolly" class="text-xl font-black">0.00</span>
                        <button onclick="changeVal('newDolly', 0.25)" class="btn-plus w-10 h-10 rounded-xl font-bold">+</button>
                    </div>
                </div>
            </div>

            <!-- Shift Notes -->
            <div id="noteArea" class="hidden">
                <textarea id="notes" placeholder="Any issues today? (Optional)" class="w-full p-4 border-2 border-slate-100 rounded-2xl bg-slate-50 text-sm italic outline-none"></textarea>
            </div>

            <!-- Timer & Action Button -->
            <div class="bg-slate-900 rounded-[2.5rem] p-10 text-center shadow-inner">
                <div id="display" class="text-6xl font-mono font-black text-white mb-8 tracking-tighter">00:00:00</div>
                <button id="mainBtn" onclick="handleTimer()" disabled class="w-full bg-slate-700 text-white font-black py-6 rounded-3xl text-xl shadow-lg transition-all active:scale-95">
                    LOCKED
                </button>
            </div>
        </div>
    </div>

    <script>
        /******************************************************************
         * SETTINGS: Your Google Web App link is safely integrated below
         ******************************************************************/
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzzXjh4iqviVP0gRN3XhlLNDm_oixhOMTIZMo0d-_CEb3Q_lqiKqN_Y-iByWXmEMjSMNg/exec"; 

        let timer, start, isWorking = false;
        let tLat = 45.3415, tLng = -80.0245; // Default Sobeys
        let graceTimer = null;

        // Update clock every second
        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleTimeString(); 
        }, 1000);

        // Update target store based on worker selection
        function updateTarget() {
            const w = document.getElementById('worker').value;
            tLat = (w === 'Deepak') ? 45.3365 : 45.3415;
            tLng = (w === 'Deepak') ? -80.0175 : -80.0245;
        }

        // Change Dolly values
        function changeVal(id, amt) {
            let el = document.getElementById(id);
            let val = Math.max(0, parseFloat(el.innerText) + amt);
            el.innerText = val.toFixed(2);
        }

        // GPS Tracker
        navigator.geolocation.watchPosition(pos => {
            const d = calculateDistance(pos.coords.latitude, pos.coords.longitude, tLat, tLng);
            const box = document.getElementById('geoBox');
            const btn = document.getElementById('mainBtn');
            document.getElementById('distText').innerText = `${Math.round(d)}m from target`;

            if (d <= 60) { // 60 meter range
                clearTimeout(graceTimer);
                graceTimer = null;
                box.className = "p-4 rounded-2xl border-2 text-center geo-active";
                document.getElementById('geoStatus').innerText = "✓ On Site";
                btn.disabled = false;
                if(!isWorking) {
                    btn.innerText = "START SHIFT";
                    btn.className = "w-full bg-green-500 text-white font-black py-6 rounded-3xl text-xl shadow-lg";
                }
            } else {
                if (isWorking && !graceTimer) {
                    graceTimer = setTimeout(() => { alert("Warning: You are away from the store site."); }, 180000);
                }
                if (!isWorking) {
                    box.className = "p-4 rounded-2xl border-2 text-center geo-locked";
                    document.getElementById('geoStatus').innerText = "✖ Location Required";
                    btn.disabled = true;
                    btn.innerText = "LOCKED";
                    btn.className = "w-full bg-slate-200 text-slate-400 font-black py-6 rounded-3xl text-xl";
                }
            }
        }, err => console.log(err), { enableHighAccuracy: true });

        // Calculate distance between points
        function calculateDistance(l1, n1, l2, n2) {
            const R = 6371e3;
            const dL = (l2-l1)*Math.PI/180;
            const dN = (n2-n1)*Math.PI/180;
            const a = Math.sin(dL/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dN/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // Handle the Button Click
        function handleTimer() {
            if(!isWorking) {
                // START
                isWorking = true;
                start = new Date();
                document.getElementById('worker').disabled = true;
                document.getElementById('noteArea').classList.remove('hidden');
                document.getElementById('mainBtn').innerText = "FINISH SHIFT";
                document.getElementById('mainBtn').className = "w-full bg-red-600 text-white font-black py-6 rounded-3xl text-xl shadow-lg";
                
                timer = setInterval(() => {
                    let diff = new Date() - start;
                    let h = Math.floor(diff/3600000);
                    let m = Math.floor((diff%3600000)/60000);
                    let s = Math.floor((diff%60000)/1000);
                    document.getElementById('display').innerText = 
                        `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                }, 1000);
            } else {
                // FINISH
                if(confirm("Submit shift data to spreadsheet?")) {
                    submit();
                }
            }
        }

        // Send data to Google Sheets
        function submit() {
            const payload = {
                worker: document.getElementById('worker').value,
                oldDolly: document.getElementById('oldDolly').innerText,
                newDolly: document.getElementById('newDolly').innerText,
                duration: document.getElementById('display').innerText,
                notes: document.getElementById('notes').value,
                date: new Date().toLocaleString()
            };

            const btn = document.getElementById('mainBtn');
            btn.innerText = "UPLOADING...";
            btn.disabled = true;

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert("Success! Shift saved.");
                location.reload();
            })
            .catch(err => {
                alert("Error sending data. Check internet.");
                btn.disabled = false;
                btn.innerText = "FINISH SHIFT";
            });
        }
    </script>
</body>
</html>
