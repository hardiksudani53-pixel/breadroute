<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bread Route Tracker</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        select, input, button, textarea { width: 100%; margin: 10px 0; padding: 12px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background-color: #5cb85c; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #timer { font-size: 2em; font-weight: bold; margin: 20px 0; color: #333; }
        #status { font-weight: bold; margin-bottom: 10px; }
        label { display: block; text-align: left; font-size: 14px; font-weight: bold; margin-top: 10px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>Bread Route Tracker</h2>
    
    <div id="status">Checking location...</div>

    <label for="worker">Worker Name:</label>
    <select id="worker">
        <option value="">-- Select Name --</option>
        <option value="BB">BB</option>
        <option value="Harshu">Harshu</option>
        <option value="Deepak">Deepak</option>
    </select>

    <label for="store">Target Store:</label>
    <select id="store" onchange="updateTarget()">
        <option value="Sobeys">Sobeys</option>
        <option value="Walmart">Walmart</option>
    </select>

    <label for="oldDolly">Old Dolly (Previous Day):</label>
    <select id="oldDolly">
        <option value="0">0</option>
        <option value="0.25">0.25</option>
        <option value="0.50">0.50</option>
        <option value="0.75">0.75</option>
        <option value="1">1</option>
        <option value="1.25">1.25</option>
        <option value="1.50">1.50</option>
        <option value="1.75">1.75</option>
        <option value="2">2</option>
        <option value="2.25">2.25</option>
        <option value="2.50">2.50</option>
        <option value="2.75">2.75</option>
        <option value="3">3</option>
        <option value="3.25">3.25</option>
        <option value="3.50">3.50</option>
        <option value="3.75">3.75</option>
        <option value="4">4</option>
        <option value="5">5</option>
    </select>
    
    <label for="newDolly">New Dolly (Fresh Stock):</label>
    <select id="newDolly">
        <option value="0">0</option>
        <option value="0.25">0.25</option>
        <option value="0.50">0.50</option>
        <option value="0.75">0.75</option>
        <option value="1">1</option>
        <option value="1.25">1.25</option>
        <option value="1.50">1.50</option>
        <option value="1.75">1.75</option>
        <option value="2">2</option>
        <option value="2.25">2.25</option>
        <option value="2.50">2.50</option>
        <option value="2.75">2.75</option>
        <option value="3">3</option>
        <option value="3.25">3.25</option>
        <option value="3.50">3.50</option>
        <option value="3.75">3.75</option>
        <option value="4">4</option>
        <option value="5">5</option>
    </select>
    
    <div id="timer">00:00:00</div>
    
    <button id="startBtn" onclick="toggleTracking()" disabled>START TRACKING</button>
    
    <textarea id="notes" placeholder="Optional Notes..."></textarea>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWBIFzFwoOPETXXdFSHtuyyBK5xfFSLqqN9teg7hmH3nAnq3VfznXl7BpaueVlwQNyGg/exec";

    let tLat = 45.34379956415204; 
    let tLng = -80.00785070506414;
    const ALLOWED_RADIUS = 300; 

    function updateTarget() {
        const s = document.getElementById('store').value;
        tLat = (s === 'Walmart') ? 45.34725026580236 : 45.34379956415204;
        tLng = (s === 'Walmart') ? -80.01192826729029 : -80.00785070506414;
        checkLocation();    
        fetchPastHistory(); 
    }

    function fetchPastHistory() {
        const worker = document.getElementById('worker').value;
        const store = document.getElementById('store').value;
        const oldDollySelect = document.getElementById('oldDolly');
        
        if (!worker || !store) return;
        
        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/plain' }, 
            body: JSON.stringify({
                action: "fetchLastCount",
                worker: worker,
                store: store
            })
        })
        .then(response => response.json())
        .then(data => {
            // This line automatically selects the matching number in the dropdown
            oldDollySelect.value = data.lastCount; 
        })
        .catch(err => console.log("History error:", err));
    }

    document.getElementById('worker').addEventListener('change', fetchPastHistory);

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const a = Math.sin((lat2-lat1)*Math.PI/360)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin((lon2-lon1)*Math.PI/360)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function checkLocation() {
        navigator.geolocation.getCurrentPosition(position => {
            const dist = getDistance(position.coords.latitude, position.coords.longitude, tLat, tLng);
            const statusEl = document.getElementById('status');
            const startBtn = document.getElementById('startBtn');
            if (dist <= ALLOWED_RADIUS) {
                statusEl.innerText = "Location verified: On-site.";
                statusEl.style.color = "green";
                startBtn.disabled = false;
            } else {
                statusEl.innerText = `Denied: ${Math.round(dist)}m away.`;
                statusEl.style.color = "red";
                startBtn.disabled = true;
            }
        }, null, { enableHighAccuracy: true });
    }

    let startTime, timerInterval, isTracking = false;

    function toggleTracking() {
        const startBtn = document.getElementById('startBtn');
        if (!isTracking) {
            isTracking = true;
            startTime = new Date();
            startBtn.innerText = "STOP TRACKING";
            startBtn.style.backgroundColor = "#d9534f"; 
            timerInterval = setInterval(() => {
                const diff = new Date() - startTime;
                const hrs = String(Math.floor(diff / 3600000)).padStart(2, '0');
                const mins = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
                const secs = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
                document.getElementById('timer').innerText = `${hrs}:${mins}:${secs}`;
            }, 1000);
        } else {
            clearInterval(timerInterval);
            submitData();
        }
    }

    function submitData() {
        const payload = {
            action: "submitData",
            sheetType: "employee",
            date: startTime.toLocaleString(),
            worker: document.getElementById('worker').value,
            oldDolly: document.getElementById('oldDolly').value,
            newDolly: document.getElementById('newDolly').value,
            duration: document.getElementById('timer').innerText,
            notes: `Store: ${document.getElementById('store').value}. ${document.getElementById('notes').value}`
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert("Data Sent!");
            location.reload();
        });
    }

    window.onload = checkLocation;
</script>
</body>
</html>
