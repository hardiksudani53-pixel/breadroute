<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bread Tracker</title>
    <style>
        /* Apple-Inspired iOS Design */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #000; /* Black background like Apple apps */
            color: #fff; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .ios-card { 
            width: 100%;
            max-width: 375px; 
            padding: 20px; 
            background: #1c1c1e; /* Dark grey Apple card */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { font-size: 24px; font-weight: 600; margin-bottom: 20px; text-align: center; color: #fff; }

        label { 
            display: block; 
            font-size: 13px; 
            text-transform: uppercase; 
            color: #8e8e93; 
            margin: 15px 0 5px 10px; 
            font-weight: 500;
        }

        /* The Dropdowns - iOS will automatically use the "Scroll Wheel" for these */
        select, textarea { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: none; 
            font-size: 17px; 
            background-color: #2c2c2e; 
            color: #0a84ff; /* Apple Blue Text */
            -webkit-appearance: none; /* Removes default arrow to look cleaner */
            appearance: none;
            box-sizing: border-box;
        }

        #status { 
            font-size: 14px; 
            margin-bottom: 20px; 
            padding: 12px; 
            border-radius: 10px; 
            background: #2c2c2e; 
            text-align: center;
            font-weight: 500;
        }

        #timer { 
            font-size: 48px; 
            font-weight: 200; 
            margin: 25px 0; 
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        /* Apple Blue Action Button */
        #startBtn { 
            width: 100%; 
            padding: 18px; 
            font-size: 18px; 
            font-weight: 600; 
            border: none; 
            border-radius: 14px; 
            cursor: pointer; 
            color: white; 
            background-color: #007aff; /* Classic iOS Blue */
            transition: all 0.2s ease;
        }

        #startBtn:active { transform: scale(0.98); opacity: 0.8; }
        #startBtn:disabled { background-color: #3a3a3c; color: #8e8e93; cursor: not-allowed; }

        textarea { height: 80px; margin-top: 15px; color: #fff; }
    </style>
</head>
<body>

<div class="ios-card">
    <h2>Tracker</h2>
    
    <div id="status">Checking Location...</div>

    <label>Worker</label>
    <select id="worker">
        <option value="">Select Name</option>
        <option value="BB">BB</option>
        <option value="Harshu">Harshu</option>
        <option value="Deepak">Deepak</option>
    </select>

    <label>Store</label>
    <select id="store" onchange="updateTarget()">
        <option value="Sobeys">Sobeys</option>
        <option value="Walmart">Walmart</option>
    </select>

    <label>Old Dolly (Previous)</label>
    <select id="oldDolly">
        <option value="0">0</option>
        <option value="0.25">0.25</option><option value="0.50">0.50</option><option value="0.75">0.75</option>
        <option value="1">1</option><option value="1.25">1.25</option><option value="1.50">1.50</option><option value="1.75">1.75</option>
        <option value="2">2</option><option value="2.25">2.25</option><option value="2.50">2.50</option><option value="2.75">2.75</option>
        <option value="3">3</option><option value="3.25">3.25</option><option value="3.50">3.50</option><option value="3.75">3.75</option>
        <option value="4">4</option><option value="5">5</option>
    </select>

    <label>New Dolly (Fresh)</label>
    <select id="newDolly">
        <option value="0">0</option>
        <option value="0.25">0.25</option><option value="0.50">0.50</option><option value="0.75">0.75</option>
        <option value="1">1</option><option value="1.25">1.25</option><option value="1.50">1.50</option><option value="1.75">1.75</option>
        <option value="2">2</option><option value="2.25">2.25</option><option value="2.50">2.50</option><option value="2.75">2.75</option>
        <option value="3">3</option><option value="3.25">3.25</option><option value="3.50">3.50</option><option value="3.75">3.75</option>
        <option value="4">4</option><option value="5">5</option>
    </select>

    <div id="timer">00:00:00</div>
    
    <button id="startBtn" onclick="toggleTracking()" disabled>Start Tracking</button>
    
    <textarea id="notes" placeholder="Notes..."></textarea>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWBIFzFwoOPETXXdFSHtuyyBK5xfFSLqqN9teg7hmH3nAnq3VfznXl7BpaueVlwQNyGg/exec";

    let tLat = 45.34379956415204; 
    let tLng = -80.00785070506414;
    const ALLOWED_RADIUS = 300; 

    function updateTarget() {
        const s = document.getElementById('store').value;
        tLat = (s === 'Walmart') ? 45.34725026580236 : 45.34379956415204;
        tLng = (s === 'Walmart') ? -80.01192826729029 : -80.00785070506414;
        checkLocation();    
        fetchPastHistory(); 
    }

    function fetchPastHistory() {
        const worker = document.getElementById('worker').value;
        const store = document.getElementById('store').value;
        if (!worker || !store) return;
        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/plain' }, 
            body: JSON.stringify({ action: "fetchLastCount", worker: worker, store: store })
        })
        .then(r => r.json())
        .then(data => {
            document.getElementById('oldDolly').value = data.lastCount; 
        });
    }

    document.getElementById('worker').addEventListener('change', fetchPastHistory);

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const a = Math.sin((lat2-lat1)*Math.PI/360)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin((lon2-lon1)*Math.PI/360)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function checkLocation() {
        navigator.geolocation.getCurrentPosition(p => {
            const dist = getDistance(p.coords.latitude, p.coords.longitude, tLat, tLng);
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('startBtn');
            if (dist <= ALLOWED_RADIUS) {
                statusEl.innerText = "✓ On-Site";
                statusEl.style.color = "#32d74b"; // iOS Green
                btn.disabled = false;
            } else {
                statusEl.innerText = "✗ Denied: " + Math.round(dist) + "m Away";
                statusEl.style.color = "#ff453a"; // iOS Red
                btn.disabled = true;
            }
        }, null, { enableHighAccuracy: true });
    }

    let startTime, timerInterval, isTracking = false;

    function toggleTracking() {
        const btn = document.getElementById('startBtn');
        if (!isTracking) {
            isTracking = true;
            startTime = new Date();
            btn.innerText = "Stop Tracking";
            btn.style.backgroundColor = "#ff453a"; 
            timerInterval = setInterval(() => {
                const diff = new Date() - startTime;
                const hrs = String(Math.floor(diff / 3600000)).padStart(2, '0');
                const mins = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
                const secs = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
                document.getElementById('timer').innerText = `${hrs}:${mins}:${secs}`;
            }, 1000);
        } else {
            clearInterval(timerInterval);
            submitData();
        }
    }

    function submitData() {
        const btn = document.getElementById('startBtn');
        btn.innerText = "Saving...";
        btn.disabled = true;
        const payload = {
            action: "submitData",
            sheetType: "employee",
            date: startTime.toLocaleString(),
            worker: document.getElementById('worker').value,
            oldDolly: document.getElementById('oldDolly').value,
            newDolly: document.getElementById('newDolly').value,
            duration: document.getElementById('timer').innerText,
            notes: `Store: ${document.getElementById('store').value}. ${document.getElementById('notes').value}`
        };
        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => { alert("Saved!"); location.reload(); });
    }

    window.onload = checkLocation;
</script>
</body>
</html>
